name: Backend-CD

run-name: Deploy ${{ github.event.workflow_run.head_sha }} to EC2

on:
  workflow_run:
    workflows:
      - Java CI with Gradle
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
  CONTAINER_NAME: board-backend

jobs:
  deploy:
    # CI가 성공했고, pull_request가 아니라 main push로 실행된 경우만 배포
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      # CI가 실행됐던 정확한 커밋의 Dockerfile을 가져옴
      - name: Repository checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # CI Workflow에서 저장한 JAR 다운로드
      - name: Download backend JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check downloaded artifact
        run: |
          echo "Downloaded JAR files:"
          ls -al build/libs

      - name: Check secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || {
            echo "DOCKERHUB_USERNAME is empty"
            exit 1
          }

          test -n "$DOCKERHUB_TOKEN" || {
            echo "DOCKERHUB_TOKEN is empty"
            exit 1
          }


      # Docker Hub 로그인
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker 이미지 빌드 및 Registry Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # EC2에 접속해서 새 이미지 배포
      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: board-backend
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}

          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN

          script_stop: true

          script: |
            set -e

            echo "Docker Hub 로그인"
            echo "$DOCKERHUB_TOKEN" |
              docker login \
                -u "$DOCKERHUB_USERNAME" \
                --password-stdin

            echo "이미지 다운로드: $IMAGE_NAME:$IMAGE_TAG"
            docker pull "$IMAGE_NAME:$IMAGE_TAG"

            echo "기존 컨테이너 제거"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            echo "새 컨테이너 실행"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/ubuntu/app/application.yml:/app/config/application.yml:ro \
              -e SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/application.yml \
              "$IMAGE_NAME:$IMAGE_TAG"

            echo "컨테이너 실행 확인"
            sleep 10

            if ! docker ps \
              --filter "name=^/${CONTAINER_NAME}$" \
              --filter "status=running" \
              --format '{{.Names}}' |
              grep -Fx "$CONTAINER_NAME"; then

              echo "컨테이너 실행 실패"
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "사용하지 않는 이미지 정리"
            docker image prune -f

            echo "배포 완료"