name: Backend-CD

run-name: Deploy ${{ github.event.workflow_run.head_sha }} to EC2

on:
  workflow_run:
    workflows:
      - Java CI with Gradle
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAME: jihyeon02/board-backend
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
  CONTAINER_NAME: board-backend

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download backend JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check downloaded artifact
        run: |
          echo "Downloaded JAR files:"
          ls -al build/libs

      # 이미지 push를 위해 GitHub Actions Runner에서는 로그인 필요
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: jihyeon02
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_SHA_TAG }}
            ${{ env.IMAGE_NAME }}:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max

      # Public 이미지는 EC2에서 로그인 없이 pull 가능
      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0

        env:
          IMAGE_NAME: jihyeon02/board-backend
          IMAGE_TAG: dev-${{ github.event.workflow_run.run_number }}
          IMAGE_SHA_TAG: sha-${{ github.event.workflow_run.head_sha }}
          CONTAINER_NAME: board-backend

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}

          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME
          command_timeout: 10m

          script: |
            set -eu

            echo "이미지 다운로드: $IMAGE_NAME:$IMAGE_TAG"
            docker pull "$IMAGE_NAME:$IMAGE_TAG"

            echo "기존 컨테이너 제거"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            echo "새 컨테이너 실행"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/ubuntu/app/application.yml:/app/config/application.yml:ro \
              -e SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/application.yml \
              "$IMAGE_NAME:$IMAGE_TAG"

            echo "컨테이너 실행 확인"
            sleep 10

            if ! docker ps \
              --filter "name=^/${CONTAINER_NAME}$" \
              --filter "status=running" \
              --format '{{.Names}}' |
              grep -Fx "$CONTAINER_NAME"; then

              echo "컨테이너 실행 실패"
              docker logs "$CONTAINER_NAME" || true
              exit 1      # Public 이미지는 EC2에서 로그인 없이 pull 가능
      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0

        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}

          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME
          command_timeout: 10m

          script: |
            set -eu

            echo "이미지 다운로드: $IMAGE_NAME:$IMAGE_TAG"
            docker pull "$IMAGE_NAME:$IMAGE_TAG"

            echo "기존 컨테이너 제거"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            echo "새 컨테이너 실행"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/ubuntu/app/application.yml:/app/config/application.yml:ro \
              -e SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/application.yml \
              "$IMAGE_NAME:$IMAGE_TAG"

            echo "컨테이너 실행 확인"
            sleep 10

            if ! docker ps \
              --filter "name=^/${CONTAINER_NAME}$" \
              --filter "status=running" \
              --format '{{.Names}}' |
              grep -Fx "$CONTAINER_NAME"; then

              echo "컨테이너 실행 실패"
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "사용하지 않는 이미지 정리"
            docker image prune -f

            echo "배포 완료"
            fi

            echo "사용하지 않는 이미지 정리"
            docker image prune -f

            echo "배포 완료"