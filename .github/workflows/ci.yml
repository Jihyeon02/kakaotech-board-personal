name: Java CI with Gradle

run-name: ${{ github.actor }} is learning GitHub Actions

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # 통합테스트 진행됨 - 연결이 되어야 CI 통과
    services:
      mysql:
        image: mysql:9.6.0

        env:
          MYSQL_DATABASE: board_test
          MYSQL_USER: board_test
          MYSQL_PASSWORD: board_test_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Copy application.yml into runner
        run: |
          mkdir -p src/main/resources
          printf '%s' '${{ secrets.APPLICATION_YML }}' \
            > src/main/resources/application-local.yml
          
          

      - name: Grant permission and build
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://54.180.213.252:3306/board_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_PROFILES_ACTIVE: local
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Check JAR file
        run: ls -al build/libs

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
          retention-days: 5
          if-no-files-found: error