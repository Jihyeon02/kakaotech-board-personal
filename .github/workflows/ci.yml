# 워크 플로우 이름
name: Java CI with Gradle
# Action tab에 보여질 이름
run-name: ${{ github.actor }} is learning GitHub Actions

# 트리거를 지정
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.6.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Copy application.yml into runner
        run: |
          mkdir -p src/main/resources
          printf '%s' '${{ secrets.APPLICATION_YML }}' \
            > src/main/resources/application-local.yml

      - name: Grant permission and build
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/test_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_PROFILES_ACTIVE: local
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Check JAR file
        run: |
          echo "현재 위치"
          pwd

          echo "빌드 결과"
          find build -maxdepth 3 -type f || true

          echo "JAR 목록"
          ls -al build/libs

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
          if-no-files-found: error
          retention-days: 5