spring:
  application:
    name: board

  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    # url: jdbc:mysql://127.0.0.1:3306/test_db
    username: root
    password: ${DB_PASSWORD}
    # password: ${{ secrets.CI_DB_PASSWORD }}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    database: mysql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true


logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: 300
  refresh-token-exp-seconds: 12096000

