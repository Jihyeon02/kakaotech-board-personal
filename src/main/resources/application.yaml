spring:
  profiles:
    active: local  # ← 추가
  application:
    name: board
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/board_dev
    username: root
    password:

    jpa:
      show-sql: true
      database-platform: org.hibernate.dialect.MySQL8Dialect
      database: mysql
      hibernate:
        ddl-auto: validate # 이미 DB에 DDL로 테이블 설정 다 했을 경우에는 validate 처리
      properties:
        hibernate:
          format_sql: true
          use_sql_comments: true

    profiles:
      active: development

  logging:
    level:
      org.hibernate.SQL: debug


jwt:
  secret: {JWT_SECRET}
  access-token-exp-seconds: 300
  refresh-token-exp-seconds: 12096000

