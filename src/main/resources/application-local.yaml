spring:
  application:
    name: board

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/board_dev
    # url: jdbc:mysql://127.0.0.1:3306/test_db
    username: root
    password:
    # password: ${{ secrets.CI_DB_PASSWORD }}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    database: mysql
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true


logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: 7pOLQVcGhoInypnDp+nv3FP8hkZtP53AyE+Xg9X1a5fgnIwp8NrYkWawGPd2sQwz2Kun5hC4/CpKLvlEss1+LA==
