spring:
  application:
    name: board

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://54.180.220.53:3306/board_db # kube 실습
    username: root
    password:
    # password: ${{ secrets.CI_DB_PASSWORD }}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    database: mysql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true


